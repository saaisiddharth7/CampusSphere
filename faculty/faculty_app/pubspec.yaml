name: faculty_app
description: CampusSphere Faculty App - Attendance, Assignments, Grades & More
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Supabase (Realtime for chat)
  supabase_flutter: ^2.9.0

  # UI / Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Camera & QR
  mobile_scanner: ^6.0.5
  qr_flutter: ^4.1.0

  # Location (for geo-fencing reference)
  geolocator: ^13.0.2

  # File Handling
  file_picker: ^8.1.7
  open_filex: ^4.5.0
  path_provider: ^2.1.5

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  timeago: ^3.7.0

  # Notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
