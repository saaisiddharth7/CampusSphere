name: campus_sphere_student
description: CampusSphere Student Mobile App — Multi-tenant campus management platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Network
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.3

  # Supabase
  supabase_flutter: ^2.6.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  timeago: ^3.6.1
  flutter_animate: ^4.5.0

  # Location & Permissions
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Camera & QR
  mobile_scanner: ^5.1.1

  # File Handling
  file_picker: ^8.1.2
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0

  # Push Notifications
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Authentication
  local_auth: ^2.2.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Others
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  uuid: ^4.4.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
