name: hod_app
description: CampusSphere HOD App — Department-level management

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.7.2

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Auth & Backend
  supabase_flutter: ^2.8.3

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # UI
  fl_chart: ^0.70.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  url_launcher: ^6.3.1

  # Date/Time
  timeago: ^3.7.0
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
